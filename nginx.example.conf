# 九烨数据官网 Nginx 配置
# 
# 使用方法:
# 1. 复制此文件到 /etc/nginx/sites-available/jiuye.conf
# 2. 将 YOUR_DOMAIN 替换为您的域名
# 3. 配置 SSL 证书路径
# 4. 创建符号链接: ln -s /etc/nginx/sites-available/jiuye.conf /etc/nginx/sites-enabled/
# 5. 测试配置: nginx -t
# 6. 重启 Nginx: systemctl restart nginx

# HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$server_name$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    
    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/YOUR_DOMAIN.pem;
    ssl_certificate_key /etc/nginx/ssl/YOUR_DOMAIN.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # 网站配置
    root /var/www/jiuye;
    index index.html;
    charset utf-8;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    
    # 静态资源缓存
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 主要路由
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # 日志
    access_log /var/log/nginx/jiuye_access.log;
    error_log /var/log/nginx/jiuye_error.log;
}
